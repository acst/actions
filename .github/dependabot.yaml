version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 5
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3

  - package-ecosystem: "npm"
    directories:
      - "/github-release-download"
      - "/set-environment-variables"
      - "/setup-terraform"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 5
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      actions-toolkit:
        patterns:
          - "@actions/*"
      types:
        patterns:
          - "@types/*"
